let historial=[];

function render(q=""){
const lista=document.getElementById("lista");
lista.innerHTML="";

const resultados=data.filter(x=>
x.nombre.toLowerCase().includes(q) ||
x.codigo.includes(q)
);

document.getElementById("contador").innerText=resultados.length;

resultados.forEach(x=>{

let div=document.createElement("div");

div.innerHTML=`
<b>${x.nombre}</b><br>

});

}

function mostrar(x){

document.getElementById("nombre").innerText=x.nombre;

x.stock>0 ?
"<span class='ok'>🟢 STOCK DISPONIBLE</span>" :
"<span class='no'>🔴 SIN STOCK</span>";

historial.unshift(x.nombre);

historial=[...new Set(historial)].slice(0,5);

document.getElementById("historial").innerHTML=
historial.join("<br>");

}

let codigo=document.getElementById("codigo").innerText;

}
